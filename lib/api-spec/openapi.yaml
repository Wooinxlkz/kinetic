openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Community
    description: |
      Community "publish your work" endpoints. Fully separate from the
      site's own curated component library (registry.ts) — these are
      user-submitted components/blocks/patterns shown on /discover.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /community/components:
    get:
      tags: [Community]
      operationId: listCommunityComponents
      summary: List published community components
      description: |
        Returns published community submissions, newest first by default.
        Never includes the site's own curated registry components.
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/CommunityCategory"
        - name: tag
          in: query
          schema:
            type: string
        - name: q
          in: query
          description: Free-text search across name and description.
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular]
            default: newest
      responses:
        "200":
          description: List of published community components.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityComponent"
    post:
      tags: [Community]
      operationId: createCommunityComponent
      summary: Publish a new community component
      description: |
        Publishes immediately (no review queue). Enforces the caller's
        plan-based publish quota (free 10 / pro 25 / sponsor 60 / lifetime
        unlimited) server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityComponentInput"
      responses:
        "201":
          description: Published.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityComponent"
        "400":
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Publish quota reached for the caller's plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /community/components/{id}:
    get:
      tags: [Community]
      operationId: getCommunityComponent
      summary: Get a single community component
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The component.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityComponent"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      tags: [Community]
      operationId: updateCommunityComponent
      summary: Update a community component (author only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityComponentUpdate"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityComponent"
        "400":
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not the author.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      tags: [Community]
      operationId: deleteCommunityComponent
      summary: Delete a community component (author or dev only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted.
        "401":
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not the author.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /community/users/{username}/components:
    get:
      tags: [Community]
      operationId: listUserCommunityComponents
      summary: List a user's published community components
      description: Used on public profile pages to show a user's published work.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The user's published components, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityComponent"
        "404":
          description: User not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /community/quota:
    get:
      tags: [Community]
      operationId: getCommunityQuota
      summary: Get the signed-in user's publish quota usage
      responses:
        "200":
          description: Quota usage for the signed-in user's plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityQuota"
        "401":
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CommunityCategory:
      type: string
      enum: [component, block, pattern]
    CommunityAuthor:
      type: object
      required: [id, name, username, avatarColor, avatarUrl, isDev]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        avatarColor:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isDev:
          type: boolean
    CommunityComponent:
      type: object
      required:
        - id
        - slug
        - name
        - description
        - category
        - tags
        - code
        - views
        - createdAt
        - updatedAt
        - author
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/CommunityCategory"
        tags:
          type: array
          items:
            type: string
        code:
          type: string
          description: |
            The component source code — what users copy/install into their project.
        demoCode:
          type: ["string", "null"]
          description: |
            Optional standalone demo that imports and uses `code`. When present,
            the preview sandbox merges both (stripping the demo's import of the
            component file). When absent, `code` is rendered directly.
        views:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/CommunityAuthor"
    CommunityComponentInput:
      type: object
      required: [name, description, category, code]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        description:
          type: string
          minLength: 1
          maxLength: 280
        category:
          $ref: "#/components/schemas/CommunityCategory"
        tags:
          type: array
          maxItems: 6
          items:
            type: string
            maxLength: 24
        code:
          type: string
          minLength: 1
          maxLength: 20000
        demoCode:
          type: string
          maxLength: 20000
    CommunityComponentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        description:
          type: string
          minLength: 1
          maxLength: 280
        category:
          $ref: "#/components/schemas/CommunityCategory"
        tags:
          type: array
          maxItems: 6
          items:
            type: string
            maxLength: 24
        code:
          type: string
          minLength: 1
          maxLength: 20000
        demoCode:
          type: string
          maxLength: 20000
    CommunityQuota:
      type: object
      required: [plan, limit, used, remaining]
      properties:
        plan:
          type: string
        limit:
          type: ["integer", "null"]
          description: Null means unlimited (lifetime plan).
        used:
          type: integer
        remaining:
          type: ["integer", "null"]
          description: Null means unlimited.
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

