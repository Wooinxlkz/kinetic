<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="40" fill="#FF3C00"/>
  <g stroke="white" stroke-width="25" stroke-linecap="round">
    <!-- Horizontal axis -->
    <line x1="16" y1="90" x2="60" y2="90"/>
    <line x1="120" y1="90" x2="164" y2="90"/>
    <!-- 60° rotated axis -->
    <line x1="16" y1="90" x2="60" y2="90" transform="rotate(60 90 90)"/>
    <line x1="120" y1="90" x2="164" y2="90" transform="rotate(60 90 90)"/>
    <!-- 120° rotated axis -->
    <line x1="16" y1="90" x2="60" y2="90" transform="rotate(120 90 90)"/>
    <line x1="120" y1="90" x2="164" y2="90" transform="rotate(120 90 90)"/>
  </g>
</svg>
