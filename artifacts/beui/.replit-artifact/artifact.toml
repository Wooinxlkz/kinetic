kind = "web"
previewPath = "/"
title = "Kinetic — UI Components"
version = "1.0.0"
id = "artifacts/beui"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19069

[services.development]
run = "pnpm --filter @workspace/beui run build && pnpm --filter @workspace/beui run start"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beui", "run", "build" ]
run = "pnpm --filter @workspace/beui run start"

[services.env]
PORT = "19069"
BASE_PATH = "/"
